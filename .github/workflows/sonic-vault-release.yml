name: Sonic Vault Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: |
          $ver = (Select-String -Path "pubspec.yaml" -Pattern '^version:\s+(.+)').Matches[0].Groups[1].Value.Split('+')[0]
          echo "version=$ver" >> $env:GITHUB_OUTPUT
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Bundle VC++ runtime DLLs
        run: |
          $dlls = @("vcruntime140.dll","vcruntime140_1.dll","msvcp140.dll","msvcp140_1.dll","msvcp140_2.dll")
          foreach ($dll in $dlls) {
            $src = "C:\Windows\System32\$dll"
            if (Test-Path $src) { Copy-Item $src "build\windows\x64\runner\Release\" -Force }
          }
      - name: Install Inno Setup
        run: choco install innosetup -y
      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DAppVersion=${{ steps.version.outputs.version }}" "installer\installer.iss"
      - name: Sign portable exe
        run: |
          signtool sign /fd SHA256 /a /f "cert\sonicvault.pfx" "build\windows\x64\runner\Release\sonicvault.exe"
      - name: Sign installer
        run: |
          signtool sign /fd SHA256 /a /f "cert\sonicvault.pfx" "installer\SonicVault-Setup-${{ steps.version.outputs.version }}.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: SonicVault-windows
          path: installer/SonicVault-Setup-${{ steps.version.outputs.version }}.exe

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: SonicVault-android
          path: build/app/outputs/flutter-apk/app-release.apk

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev
      - run: flutter build linux --release
      - name: Package Linux build
        run: |
          tar -czf SonicVault-linux.tar.gz -C build/linux/x64/release/bundle .
      - uses: actions/upload-artifact@v4
        with:
          name: SonicVault-linux
          path: SonicVault-linux.tar.gz

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Package macOS build
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../SonicVault-macos.zip sonicvault.app
      - uses: actions/upload-artifact@v4
        with:
          name: SonicVault-macos
          path: SonicVault-macos.zip

  create-release:
    name: Create Release
    needs: [build-windows, build-android, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            SonicVault-windows/SonicVault-Setup-${{ needs.build-windows.outputs.version }}.exe \
            SonicVault-android/app-release.apk \
            SonicVault-linux/SonicVault-linux.tar.gz \
            SonicVault-macos/SonicVault-macos.zip \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
